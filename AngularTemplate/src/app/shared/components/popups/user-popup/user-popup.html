<div class="popup-overlay" (click)="close()"></div>

<div class="user-popup-container shadow-lg border rounded-3 bg-white p-3">
    <div class="d-flex flex-column justify-content-center align-items-center gap-2 w-100">
        @if (userService.user()){
            <div class="perfil-logo rounded-circle d-flex align-items-center justify-content-center">
                <img src="{{userService.user()?.photo_perfil}}" class="img-fluid rounded-circle w-100 h-100">
            </div>
            <div class="w-100" style="min-width: 0">
                <p class="m-0 p-0 fw-bold text-truncate">{{ userService.user()?.names }}</p>
                <p class="m-0 p-0 text-light text-truncate">{{ userService.user()?.email }}</p>
            </div>

            <div class="w-100 mt-3 d-flex flex-column gap-2">
                <div class="btn-popup-perfil c-pointer text-primary d-flex align-items-center gap-2 justify-content-center p-1 rounded-3">
                    <i class="fa-solid fa-user-pen"></i>
                    <span class="fw-semibold">Ver perfil</span>
                </div>

                <div class="btn-popup-logout c-pointer d-flex text-danger align-items-center gap-2 justify-content-center p-1 rounded-3"
                    (click)="userService.logout(); close()"
                >
                    <i class="fa-solid fa-user-pen"></i>
                    <span class="fw-semibold">Cerrar sesión</span>
                </div>
            </div>
        }
    </div>


</div>
