<div class="">
    <div class="bg-white-shadow rounded-3 mt-5 p-5 d-flex flex-column gap-3 text-center justify-content-center align-items-center">
        <i class="fa-solid fa-crown box text-warning"></i>
        <h3 class="m-0 p-0">¡Se realizo con éxito la compra!</h3>
        <p>Gracias por tu compra, {{customerName}}. Recibimos tu pedido y lo estamos preparando para su envío.</p>

        <div class="d-flex gap-2 align-items-center justify-content-center">
            <div class="rounded-pill bg-primary bg-opacity-10 px-3 py-1">
                <span>ID: {{orderSlug}}</span>
            </div>
            <button class="c-pointer btn btn-black-white p-0 m-0 px-2 py-1 border-0 rounded-pill" (click)="copyText()">
                <i class="fa-solid fa-copy"></i>
            </button>
        </div>


        <div class="mt-4 d-flex gap-3">
            <button class="btn btn-primary" routerLink="/categories/all">
                <i class="fa-solid fa-cart-shopping pe-4"></i>
                Seguir comprando
            </button>
            <button class="btn btn-black-white" routerLink="/orders/{{orderSlug}}">
                <i class="fa-solid fa-binoculars pe-4"></i>
                Ver detalles del pedido
            </button>
        </div>
    </div>
</div>
