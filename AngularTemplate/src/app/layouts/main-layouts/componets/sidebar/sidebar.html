<div class="modal-backdrop" (click)="cancelar()">
    <section class="view-content" (click)="$event.stopPropagation()">
        <div class="d-flex align-items-center justify-content-between px-2 pt-3 pb-4 border-bottom border-secondary">

            <div class="d-flex gap-2 align-items-center justify-content-center">
                <div class="perfil-logo bg-light rounded-circle">
                </div>
                <div class="">
                    <p class="m-0 p-0 fw-bold">Juan Ortiz</p>
                    <p class="m-0 p-0 text-light">Lector ávido</p>
                </div>
            </div>

            <div class="cerrar bg-danger rounded-circle d-flex justify-content-center align-items-center c-pointer"
                 (click)="cancelar()"
            >
                <i class="fa-solid fa-xmark text-white"></i>
            </div>
        </div>

        <div class="d-flex flex-column h-100 justify-content-between">
            <div class="d-flex flex-column p-1 gap-1">
                <div class="item d-flex gap-3 p-3 align-items-center rounded-3 bg-opacity-10"
                     routerLink="/dashboard"
                     routerLinkActive="bg-primary text-primary"
                >
                    <i class="fa-solid fa-house fs-5"></i>
                    <span class="fw-bold">Inicio</span>
                </div>

                <div class="item d-flex gap-3 p-3 align-items-center rounded-3 bg-opacity-10"
                     routerLink="/categories"
                     routerLinkActive="bg-primary text-primary"
                >
                    <i class="fa-solid fa-shapes fs-5"></i>
                    <span class="fw-bold">Explorar categorías</span>
                </div>

                <div class="item d-flex gap-3 p-3 align-items-center rounded-3 bg-opacity-10"
                     routerLink="/wishlist"
                     routerLinkActive="bg-primary text-primary"
                >
                    <i class="fa-solid fa-heart fs-5"></i>
                    <span class="fw-bold">Mi lista</span>
                </div>

                <div class="item d-flex gap-3 p-3 align-items-center rounded-3 bg-opacity-10"
                     routerLink="/library"
                     routerLinkActive="bg-primary text-primary"
                >
                    <i class="fa-solid fa-book fs-5"></i>
                    <span class="fw-bold">Biblioteca</span>
                </div>

                <div class="item d-flex gap-3 p-3 align-items-center rounded-3 bg-opacity-10"
                     routerLink="/library"
                     routerLinkActive="bg-primary text-primary"
                >
                    <i class="fa-solid fa-user fs-5"></i>
                    <span class="fw-bold">Ver perfil</span>
                </div>
            </div>

            <div class="p-1">
                <div class="item-logout d-flex gap-3 p-3 text-danger align-items-center rounded-3 bg-opacity-10"
                >
                    <i class="fa-solid fa-right-from-bracket fs-5"></i>
                    <span class="fw-bold">Cerrar sesión</span>
                </div>
            </div>
        </div>
    </section>
</div>
